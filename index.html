<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Wochen Tracker</title>
<style>
    body{background:#0b0b0d;color:#fff;font-family:sans-serif;padding:20px}
    .card{background:#222;padding:20px;border-radius:15px;margin-bottom:15px;max-width:800px}
    input{padding:10px;width:100%;margin-bottom:10px;border-radius:8px;border:none}
    button{padding:10px 20px;background:#0a84ff;border:none;border-radius:8px;color:#fff;cursor:pointer}
    table{width:100%;border-collapse:collapse;margin-top:20px}
    th,td{padding:10px;border:1px solid #444;text-align:left}
</style>
</head>
<body>
    <div class="card">
        <h1>🍎 Wochen Tracker</h1>
        <input id="name" placeholder="Name">
        <input id="week" type="number" placeholder="KW">
        <input id="money" type="number" placeholder="Schwarzgeld">
        <button onclick="addData()">Speichern</button>
    </div>
    <div class="card">
        <h2>Übersicht</h2>
        <table id="dataTable">
            <tr><th>Name</th><th>KW</th><th>Schwarzgeld</th><th>Aktion</th></tr>
        </table>
    </div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbybtiudUCe7UtnYXukgEJ9hB9R-4WgqZZxmy7pDZ1rRIsdCzU-eIezJQx1WctLRAFsQ/exec";

// 1. Daten speichern
async function addData() {
    const data = {
        n: document.getElementById('name').value,
        w: document.getElementById('week').value,
        m: document.getElementById('money').value
    };
    
    await fetch(API_URL, {
        method: "POST",
        mode: "no-cors",
        body: JSON.stringify(data)
    });
    location.reload(); // Seite neu laden um Tabelle zu aktualisieren
}

// 2. Daten laden (Hierfür müsstest du im Apps Script einen "doGet" Handler haben, 
// der die Tabelleninhalte als JSON zurückgibt)
</script>
</body>
</html>
