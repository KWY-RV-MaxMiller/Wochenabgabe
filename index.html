<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Tracker mit Google Sheets</title>
<style>
/* Dein bisheriges CSS bleibt gleich */
body{margin:0;background:#0b0b0d;color:#fff;font-family:sans-serif}
.wrap{max-width:800px;margin:auto;padding:20px}
button{padding:10px;background:#0a84ff;color:#fff;border:none;border-radius:8px;cursor:pointer}
</style>
</head>
<body>
<div class="wrap">
    <h1>🍎 Tracker</h1>
    <input id="name" placeholder="Name">
    <button onclick="saveData()">Daten speichern</button>
</div>

<script>
// DEINE NEUE URL
const API_URL = "https://script.google.com/macros/s/AKfycbybtiudUCe7UtnYXukgEJ9hB9R-4WgqZZxmy7pDZ1rRIsdCzU-eIezJQx1WctLRAFsQ/exec";

async function saveData() {
    const payload = { name: document.getElementById("name").value, time: new Date() };
    
    // Daten an Google senden
    await fetch(API_URL, {
        method: "POST",
        mode: "no-cors",
        body: JSON.stringify(payload)
    });
    alert("Gespeichert!");
}

async function loadData() {
    const response = await fetch(API_URL);
    const data = await response.json();
    console.log("Daten aus Google:", data);
}
</script>
</body>
</html>
